version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "Composer"
      include: "scope"
    labels:
      - "composer"
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "GitHub Actions"
      include: "scope"
    labels:
      - "github-actions"
      - "continuous-integration"